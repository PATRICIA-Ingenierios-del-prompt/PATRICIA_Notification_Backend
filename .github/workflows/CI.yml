name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  pull-requests: read

env:
  # Debe coincidir con el path del repo ECR: <registry>/patricia-dev/notification
  # (los repos ECR se llaman "${project}-${env}/${service}" = "patricia-dev/notification").
  IMAGE_NAME: patricia-dev/notification

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Unit tests only (pure Mockito) — no external services needed at test time.
    # Mongo/Redis/RabbitMQ are wired for runtime via docker-compose, not for the suite.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build, test & coverage
        run: mvn -B clean verify -Pcoverage

      # -------------------------------------------------------------------------
      # SonarCloud quality gate. Estaba comentado en el CI.yml original -
      # descomentado + continue-on-error: true porque el problema de
      # "Automatic Analysis" vs "CI-based Analysis" en SonarCloud sigue sin
      # resolverse del todo para la organizacion (ver nota en Auth/Matching/
      # Events CI.yml).
      # -------------------------------------------------------------------------
      - name: Sonar analysis (branch)
        if: github.event_name == 'push'
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
        run: |
          mvn --batch-mode sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_BACKEND }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_BACKEND }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=${GITHUB_WORKSPACE}/target/site/jacoco/jacoco.xml \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.exclusions="**/NotificationApplication.java" \
            -Dsonar.coverage.exclusions="**/NotificationApplication.java,**/dto/**,**/document/**,**/config/**"

      - name: Sonar analysis (pull request)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn --batch-mode sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_BACKEND }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_BACKEND }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=${GITHUB_WORKSPACE}/target/site/jacoco/jacoco.xml \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.exclusions="**/NotificationApplication.java" \
            -Dsonar.coverage.exclusions="**/NotificationApplication.java,**/dto/**,**/document/**,**/config/**" \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }}

      # On PRs we only verify the Dockerfile still builds; the real image is
      # built and pushed by the push-image job on develop/main.
      - name: Build Docker image (verify Dockerfile works)
        if: github.event_name == 'pull_request'
        run: docker build -t ${{ env.IMAGE_NAME }}:ci .

  # ---------------------------------------------------------------------------
  # CD (§1.2): push the image to ECR on every push to develop/main.
  # NUEVO: este job no existia en el CI.yml original (solo build-and-test).
  # ---------------------------------------------------------------------------
  push-image:
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}

      - name: Compute image tag (short SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Check if image tag already exists in ECR
        id: check-image
        run: |
          if aws ecr describe-images \
              --repository-name ${{ env.IMAGE_NAME }} \
              --image-ids imageTag=${{ steps.meta.outputs.tag }} \
              --region ${{ vars.AWS_REGION }} >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        if: steps.check-image.outputs.exists == 'false'
        run: |
          IMAGE=${{ vars.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}
          docker build -t $IMAGE:${{ steps.meta.outputs.tag }} .
          docker push $IMAGE:${{ steps.meta.outputs.tag }}

      - name: Skip push (tag already exists)
        if: steps.check-image.outputs.exists == 'true'
        run: echo "Tag ${{ steps.meta.outputs.tag }} already exists in ${{ env.IMAGE_NAME }} — reusing existing image."

  # ---------------------------------------------------------------------------
  # CD (§1.3): deploy to EKS on push to main ONLY.
  # NUEVO: este job tampoco existia. --timeout 10m (NO 5m).
  # Rollback manual: helm rollback notification -n patricia-app
  # ---------------------------------------------------------------------------
  deploy:
    needs: push-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ vars.AWS_REGION }}

      - name: Deploy (helm upgrade, gated by --wait)
        run: |
          helm upgrade notification ./deploy \
            --install \
            --namespace patricia-app \
            --set image.repository=${{ vars.ECR_REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.push-image.outputs.image_tag }} \
            --wait --timeout 10m

      - name: Smoke check
        run: |
          # In-cluster, no la URL publica (mismo patron que Auth/Matching/Events).
          kubectl run smoke-notification-$GITHUB_RUN_ID --namespace patricia-app \
            --image=curlimages/curl:8.8.0 --restart=Never --rm -i --quiet \
            --command -- curl -sf --retry 10 --retry-delay 6 --retry-all-errors \
            http://notification.patricia-app.svc.cluster.local:8091/actuator/health

      - name: Verify pod carries the "socket" SG tier (not "standard")
        run: |
          # Chequeo defensivo: si por error el chart se desplego con
          # patricia.io/sg-tier: standard, el pod arranca y pasa el smoke
          # check de arriba (actuator/health no depende del backplane) pero
          # el relay de Redis del backplane jamas conecta. Esto lo detecta
          # temprano en vez de descubrirlo con notificaciones que nunca
          # llegan en produccion.
          TIER=$(kubectl get pods -n patricia-app -l app=notification \
            -o jsonpath='{.items[0].metadata.labels.patricia\.io/sg-tier}')
          if [ "$TIER" != "socket" ]; then
            echo "ERROR: pod de notification tiene sg-tier='$TIER', esperaba 'socket'"
            exit 1
          fi
          echo "OK: sg-tier=socket confirmado"
