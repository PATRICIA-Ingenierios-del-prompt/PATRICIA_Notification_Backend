services:
  mongo:
    image: mongo:7
    container_name: notification-mongo
    ports:
      # Host 27017 (no other PATRICIA stack runs a local Mongo).
      - "27017:27017"
    volumes:
      - notification_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - notification-net

  redis:
    image: redis:7-alpine
    container_name: notification-redis
    ports:
      # Host 6381 to avoid clashing with Parches (6379) and Location (6380).
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - notification-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: notification-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      # Host ports shifted (+3) to avoid clashing with Parches (5672/15672),
      # Events (5673/15673) and Location (5674/15674). This is an *isolated* broker —
      # no messages cross to the other stacks. For real cross-MS integration, attach
      # all apps to a shared external network and point them at a single RabbitMQ.
      - "5675:5672"      # AMQP
      - "15675:15672"    # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - notification-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification-app
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongo:27017/notification_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    ports:
      - "8091:8091"
    networks:
      - notification-net

networks:
  notification-net:
    driver: bridge

volumes:
  notification_mongo_data:
