# Pulls everything Notification needs from AWS Secrets Manager into a
# native K8s Secret (notification-secrets) that the Deployment mounts via
# envFrom.
#
# notification/mongodb: nativo SPRING_DATA_MONGODB_URI en AWS SM, mapeado
# al secretKey custom MONGODB_URI porque asi es como
# application.properties ya lo espera (no se toco el codigo).
#
# cache-redis (Cluster #1, TTL cache): usado solo por
# UnreadCounterRedisAdapter. Mismos nombres REDIS_HOST/PORT/PASSWORD que ya
# usan Auth/Parche Core/Location/Matching.
#
# backplane-redis (Cluster #2, pub/sub): usado por
# BackplaneRedisConfig/RedisNotificationRelayPublisher/Subscriber (nuevos).
# Sus keys en AWS SM YA son nativas BACKPLANE_REDIS_HOST/PORT/PASSWORD -- se
# mapean 1:1, sin necesidad de renombrar nada.
#
# amazon-mq: compartido, keys nativas SPRING_RABBITMQ_*.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: notification-secrets
  namespace: patricia-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: notification-secrets
    creationPolicy: Owner
  data:
    - secretKey: MONGODB_URI
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/notification/mongodb", property: SPRING_DATA_MONGODB_URI }
    - secretKey: REDIS_HOST
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_HOST }
    - secretKey: REDIS_PORT
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_PORT }
    - secretKey: REDIS_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_PASSWORD }
    - secretKey: BACKPLANE_REDIS_HOST
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/backplane-redis", property: BACKPLANE_REDIS_HOST }
    - secretKey: BACKPLANE_REDIS_PORT
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/backplane-redis", property: BACKPLANE_REDIS_PORT }
    - secretKey: BACKPLANE_REDIS_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/backplane-redis", property: BACKPLANE_REDIS_PASSWORD }
    - secretKey: SPRING_RABBITMQ_ADDRESSES
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_ADDRESSES }
    - secretKey: SPRING_RABBITMQ_USERNAME
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_USERNAME }
    - secretKey: SPRING_RABBITMQ_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_PASSWORD }
