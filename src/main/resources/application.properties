spring.application.name=notification
server.port=8091

# MongoDB - durable notification payloads (the filing cabinet).
# MONGODB_URI es nombre custom -> se mapea desde SPRING_DATA_MONGODB_URI
# (nativo, patricia-dev/notification/mongodb) en el ExternalSecret, sin
# tocar esta linea.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/notification_db}

# Redis Cluster #1 (cache) - hot unread-count cache (the sticky-note badge).
# ssl.enabled=true: ElastiCache Cluster #1 tiene transit_encryption_enabled=true,
# igual que en Matching/Auth.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}

# Redis Cluster #2 (backplane) - pub/sub relay para que el broadcast STOMP
# llegue a los clientes conectados a CUALQUIER replica, no solo a la que
# recibio el evento de RabbitMQ. Ver BackplaneRedisConfig / RedisNotification-
# RelayPublisher / RedisNotificationRelaySubscriber (nuevos, agregados junto
# con este fix). backplane.redis.ssl.enabled=true por default porque
# ElastiCache Cluster #2 tiene backplane_tls_enabled=true en Terraform.
backplane.redis.host=${BACKPLANE_REDIS_HOST:localhost}
backplane.redis.port=${BACKPLANE_REDIS_PORT:6379}
backplane.redis.password=${BACKPLANE_REDIS_PASSWORD:}
backplane.redis.ssl.enabled=${BACKPLANE_REDIS_SSL_ENABLED:false}
backplane.redis.channel=${BACKPLANE_REDIS_CHANNEL:notifications:broadcast}

# RabbitMQ - inbound domain events (consume-only). Amazon MQ exige el scheme
# amqps://, que solo `addresses` codifica bien (host/port sueltos no
# bastan) - mismo fix ya aplicado en Auth/Matching/Events.
spring.rabbitmq.addresses=${SPRING_RABBITMQ_ADDRESSES:amqp://guest:guest@localhost:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# Expo push (React Native / Expo Go)
expo.push.enabled=${EXPO_PUSH_ENABLED:true}
expo.push.url=${EXPO_PUSH_URL:https://exp.host/--/api/v2/push/send}
# Optional Expo access token (Expo "enhanced security" for push); blank = not required.
expo.push.access-token=${EXPO_PUSH_ACCESS_TOKEN:}

# Notification retention (Mongo TTL) and feed sizing
notification.retention-days=${NOTIFICATION_RETENTION_DAYS:90}
notification.feed.default-limit=${NOTIFICATION_FEED_LIMIT:30}

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator - no hay spring-security en este servicio (solo confia en
# X-User-Id del Gateway, igual que Events/Matching), asi que no hay riesgo
# del bug de Auth (401 en /actuator/health/liveness).
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
