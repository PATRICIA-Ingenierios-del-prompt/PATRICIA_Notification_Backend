spring.application.name=notification
server.port=8091

# MongoDB - durable notification payloads (the filing cabinet)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/notification_db}

# Redis - hot unread-count cache (the sticky-note badge)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# RabbitMQ - inbound domain events (consume-only)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Notification retention (Mongo TTL) and feed sizing
notification.retention-days=${NOTIFICATION_RETENTION_DAYS:90}
notification.feed.default-limit=${NOTIFICATION_FEED_LIMIT:30}

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
